# ==============================================================================
# Configuración de Dependabot
# ==============================================================================
# Dependabot revisa tus dependencias y abre PRs para actualizarlas.
# Documentación: https://docs.github.com/code-security/dependabot/dependabot-version-updates
# ==============================================================================

version: 2

updates:
  # GitHub Actions usadas en los workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci-cd"
    commit-message:
      prefix: "chore"
      include: "scope"

  # Dependencias Maven del módulo de la aplicación
  - package-ecosystem: "maven"
    directory: "/auth-console"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
